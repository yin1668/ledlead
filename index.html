    // ========== 渲染分类和链接 ==========
    function renderCategories() {
        const container = document.getElementById('categoriesContainer');
        if (!container) return;
        
        let html = '';
        categoriesData.forEach(cat => {
            const linkCount = cat.links.length;
            const showExpand = linkCount > 6; // 超过6个显示展开按钮
            
            html += `
                <div class="category" data-category="${cat.id}">
                    <div class="category-header">
                        <h2 class="category-title">${cat.title} <small>${cat.subtitle}</small></h2>
                        <span class="category-count">${linkCount}个站点</span>
                    </div>
                    <ul class="link-grid" id="grid-${cat.id}">
                        ${cat.links.map(link => `
                            <li class="link-item">
                                <a href="${link.url}" target="_blank" rel="noopener noreferrer">
                                    <span class="link-icon">${cat.icon}</span>
                                    <span class="link-name">${link.name}</span>
                                </a>
                                <span class="link-desc">${link.desc}</span>
                            </li>
                        `).join('')}
                    </ul>
                    ${showExpand ? `<button class="expand-btn" onclick="toggleExpand(${cat.id})">📋 展开全部 <span>▼</span></button>` : ''}
                </div>
            `;
        });
        container.innerHTML = html;
        countTotalLinks();
        
        // 初始化所有网格的折叠状态
        categoriesData.forEach(cat => {
            if (cat.links.length > 6) {
                const grid = document.getElementById(`grid-${cat.id}`);
                if (grid) {
                    grid.style.maxHeight = '380px';
                    grid.style.overflow = 'hidden';
                }
            }
        });
    }
    
    // 展开/收起功能
    window.toggleExpand = function(catId) {
        const grid = document.getElementById(`grid-${catId}`);
        const btn = grid?.parentElement?.querySelector('.expand-btn');
        if (!grid || !btn) return;
        
        const isExpanded = grid.style.maxHeight !== '380px';
        if (isExpanded) {
            grid.style.maxHeight = '380px';
            grid.style.overflow = 'hidden';
            btn.innerHTML = '📋 展开全部 <span>▼</span>';
        } else {
            grid.style.maxHeight = grid.scrollHeight + 'px';
            grid.style.overflow = 'visible';
            btn.innerHTML = '📋 收起 <span>▲</span>';
        }
    };
    
    // 统计链接总数
    function countTotalLinks() {
        let total = 0;
        categoriesData.forEach(cat => total += cat.links.length);
        const totalSpan = document.getElementById('totalLinks');
        if (totalSpan) totalSpan.innerText = total;
    }
    
    // 搜索功能
    window.searchLinks = function() {
        const input = document.getElementById('searchInput');
        const filter = input.value.toLowerCase().trim();
        let visibleTotal = 0;
        
        categoriesData.forEach((cat, idx) => {
            const categoryDiv = document.querySelector(`.category[data-category="${cat.id}"]`);
            if (!categoryDiv) return;
            
            const links = categoryDiv.querySelectorAll('.link-item');
            let visibleInCat = 0;
            
            links.forEach((link, linkIdx) => {
                const text = link.textContent.toLowerCase();
                if (filter === '' || text.includes(filter)) {
                    link.style.display = '';
                    visibleTotal++;
                    visibleInCat++;
                } else {
                    link.style.display = 'none';
                }
            });
            
            const countSpan = categoryDiv.querySelector('.category-count');
            if (countSpan) {
                if (filter !== '') {
                    countSpan.textContent = `${visibleInCat}/${cat.links.length}个站点`;
                } else {
                    countSpan.textContent = `${cat.links.length}个站点`;
                }
            }
            
            categoryDiv.style.display = (filter === '' || visibleInCat > 0) ? '' : 'none';
        });
        
        if (filter === '') {
            countTotalLinks();
        } else {
            const totalSpan = document.getElementById('totalLinks');
            if (totalSpan) totalSpan.innerText = visibleTotal;
        }
    };
    
    // 弹窗控制
    const modal = document.getElementById('submitModal');
    const openModalBtn = document.getElementById('openModalBtn');
    const footerSubmitBtn = document.getElementById('footerSubmitBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    
    function openModal() { if(modal) modal.classList.add('show'); }
    function closeModal() { if(modal) modal.classList.remove('show'); }
    
    if(openModalBtn) openModalBtn.addEventListener('click', openModal);
    if(footerSubmitBtn) footerSubmitBtn.addEventListener('click', (e) => { e.preventDefault(); openModal(); });
    if(closeModalBtn) closeModalBtn.addEventListener('click', closeModal);
    if(modal) modal.addEventListener('click', (e) => { if(e.target === modal) closeModal(); });
    
    // 提交表单
    const submitForm = document.getElementById('submitForm');
    if(submitForm) {
        submitForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('siteName')?.value.trim();
            const url = document.getElementById('siteUrl')?.value.trim();
            const category = document.getElementById('siteCategory')?.value;
            const desc = document.getElementById('siteDesc')?.value.trim();
            
            if(!name || !url) {
                alert('请填写网站名称和网址链接');
                return;
            }
            
            const newSite = { name, url, category, desc: desc || '待补充', date: new Date().toLocaleString() };
            let pending = JSON.parse(localStorage.getItem('pendingSites') || '[]');
            pending.push(newSite);
            localStorage.setItem('pendingSites', JSON.stringify(pending));
            
            alert(`✅ 提交成功！\n网站：${name}\n分类：${category}\n\n我们会尽快审核收录！`);
            submitForm.reset();
            closeModal();
            console.log('待审核:', pending);
        });
    }
    
    // 返回顶部
    window.addEventListener('scroll', () => {
        const backBtn = document.getElementById('backToTop');
        if(backBtn) backBtn.classList.toggle('show', window.scrollY > 300);
    });
    window.scrollToTop = function() { window.scrollTo({ top: 0, behavior: 'smooth' }); };
    
    // 页面加载完成
    document.addEventListener('DOMContentLoaded', () => {
        renderCategories();
        const pending = localStorage.getItem('pendingSites');
        if(pending && JSON.parse(pending).length > 0) {
            console.log(`📋 有 ${JSON.parse(pending).length} 条网址待审核`);
        }
    });
